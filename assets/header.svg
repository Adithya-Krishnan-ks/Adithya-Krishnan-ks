<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 300" width="100%" height="100%" style="border-radius: 12px; background: #06070a;">
  <defs>
    <!-- Import Google Fonts -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&amp;family=Rajdhani:wght@600;700&amp;family=Share+Tech+Mono&amp;display=swap');
      
      .glitch-text {
        font-family: 'Orbitron', -apple-system, sans-serif;
        font-weight: 900;
        fill: #ffffff;
        letter-spacing: 5px;
        text-shadow: 0 0 10px rgba(0, 243, 255, 0.6), 0 0 20px rgba(255, 0, 127, 0.4);
      }
      
      .neon-magenta {
        color: #ff007f;
        fill: #ff007f;
        text-shadow: 0 0 8px rgba(255, 0, 127, 0.7);
      }
      
      .neon-cyan {
        color: #00f3ff;
        fill: #00f3ff;
        text-shadow: 0 0 8px rgba(0, 243, 255, 0.7);
      }
      
      .tech-mono {
        font-family: 'Share Tech Mono', monospace;
      }
      
      .hud-label {
        font-family: 'Rajdhani', sans-serif;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 2px;
      }

      /* Pulse animation for HUD elements */
      @keyframes pulse {
        0% { opacity: 0.4; }
        50% { opacity: 1; }
        100% { opacity: 0.4; }
      }
      .anim-pulse {
        animation: pulse 3s infinite ease-in-out;
      }
    </style>

    <!-- Filters for Neon Glow -->
    <filter id="glow-cyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="glow-magenta" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <filter id="glow-purple" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur1" />
      <feGaussianBlur stdDeviation="15" result="blur2" />
      <feMerge>
        <feMergeNode in="blur2" />
        <feMergeNode in="blur1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Linear Gradients -->
    <linearGradient id="border-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff007f" />
      <stop offset="35%" stop-color="#9d4edd" />
      <stop offset="70%" stop-color="#00f3ff" />
      <stop offset="100%" stop-color="#ff007f" />
    </linearGradient>

    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="50%" stop-color="#d1f7ff" />
      <stop offset="100%" stop-color="#ffffff" />
    </linearGradient>

    <!-- Grid Pattern -->
    <pattern id="tech-grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#121620" stroke-width="1" />
      <circle cx="0" cy="0" r="1.5" fill="#1b2234" />
    </pattern>
  </defs>

  <!-- Background Base -->
  <rect width="100%" height="100%" fill="#06070a" />
  
  <!-- Subtle Grid Pattern Overlay -->
  <rect width="100%" height="100%" fill="url(#tech-grid)" opacity="0.75" />

  <!-- Outer Cyber Decorative Lines -->
  <path d="M 20,20 L 150,20 M 20,20 L 20,80" stroke="#00f3ff" stroke-width="1.5" fill="none" opacity="0.4" filter="url(#glow-cyan)" />
  <path d="M 830,280 L 700,280 M 830,280 L 830,220" stroke="#ff007f" stroke-width="1.5" fill="none" opacity="0.4" filter="url(#glow-magenta)" />
  
  <path d="M 830,20 L 780,20 L 800,40" stroke="#9d4edd" stroke-width="1.2" fill="none" opacity="0.3" />
  <path d="M 20,280 L 70,280 L 50,260" stroke="#9d4edd" stroke-width="1.2" fill="none" opacity="0.3" />

  <!-- Background Ambient Glow Behind Card -->
  <rect x="50" y="50" width="750" height="200" rx="16" fill="#7f00ff" opacity="0.08" filter="url(#glow-purple)" />

  <!-- Glassmorphic Main Card -->
  <g id="glass-card">
    <!-- Blur & Shadow Overlay -->
    <rect x="40" y="40" width="770" height="220" rx="16" fill="#0b0d15" fill-opacity="0.8" />
    <!-- Glowing Border -->
    <rect x="40" y="40" width="770" height="220" rx="16" fill="none" stroke="url(#border-grad)" stroke-width="2.5" opacity="0.9" />
  </g>

  <!-- Cyber Decals on the Card Corners -->
  <g opacity="0.7">
    <!-- Top-Left Corner cuts -->
    <line x1="45" y1="55" x2="65" y2="55" stroke="#ff007f" stroke-width="2" />
    <line x1="45" y1="55" x2="45" y2="75" stroke="#ff007f" stroke-width="2" />
    
    <!-- Bottom-Right Corner cuts -->
    <line x1="805" y1="245" x2="785" y2="245" stroke="#00f3ff" stroke-width="2" />
    <line x1="805" y1="245" x2="805" y2="225" stroke="#00f3ff" stroke-width="2" />
  </g>

  <!-- Technical Overlay HUD Text -->
  <g class="tech-mono" font-size="9" fill="#4d5b7c" opacity="0.8">
    <text x="60" y="65">SYS.LOC: 127.0.0.1</text>
    <text x="60" y="78">CORE.INIT: DONE (0x9F)</text>
    <text x="790" y="65" text-anchor="end">STATUS: ACTIVE</text>
    <text x="790" y="78" text-anchor="end" class="neon-magenta anim-pulse">● SECURE_CONN</text>
  </g>

  <!-- Main Information -->
  <g>
    <!-- Small Category Label -->
    <rect x="365" y="63" width="120" height="18" rx="4" fill="#131622" stroke="#ff007f" stroke-width="1" stroke-opacity="0.4" />
    <text x="425" y="76" text-anchor="middle" class="hud-label neon-magenta" font-size="10">USER PROFILE // INTEL</text>

    <!-- Name Heading -->
    <text x="425" y="140" text-anchor="middle" class="glitch-text" font-size="34">ADITHYA KRISHNAN K S</text>

    <!-- Subtitle (Glow Cyan) -->
    <text x="425" y="185" text-anchor="middle" class="hud-label neon-cyan" font-size="15" letter-spacing="4">FULL STACK DEVELOPER • APPLIED AI</text>
  </g>

  <!-- HUD Horizontal Dividers & Bottom Metrics -->
  <path d="M 60,205 L 790,205" stroke="#1c2234" stroke-width="1.5" stroke-dasharray="5 5" />
  
  <g class="tech-mono" font-size="10" fill="#697b9e" opacity="0.9">
    <!-- Column 1 -->
    <text x="70" y="225">BTech IT Undergraduate</text>
    <circle cx="215" cy="221" r="3" fill="#ff007f" />
    
    <!-- Column 2 -->
    <text x="245" y="225">Healthcare + Tech Integration</text>
    <circle cx="440" cy="221" r="3" fill="#00f3ff" />
    
    <!-- Column 3 -->
    <text x="470" y="225">Applied Machine Learning</text>
    <circle cx="625" cy="221" r="3" fill="#9d4edd" />

    <!-- Column 4 -->
    <text x="655" y="225">Startup Co-Owner</text>
  </g>

  <!-- Visual graph accents in bottom corners -->
  <path d="M 750,230 L 760,225 L 770,232 L 780,223 L 790,235" fill="none" stroke="#00f3ff" stroke-width="1.5" opacity="0.6" filter="url(#glow-cyan)" />
</svg>
