<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 600" width="100%" height="100%" style="border-radius: 12px; background: #06070a;">
  <defs>
    <!-- Import Google Fonts -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800;900&amp;family=Rajdhani:wght@600;700&amp;family=Share+Tech+Mono&amp;display=swap');
      
      .header-title {
        font-family: 'Orbitron', -apple-system, sans-serif;
        font-weight: 800;
        fill: #ffffff;
        letter-spacing: 2px;
        font-size: 18px;
        text-shadow: 0 0 10px rgba(0, 243, 255, 0.4);
      }
      
      .panel-title {
        font-family: 'Rajdhani', sans-serif;
        font-weight: 700;
        letter-spacing: 1.5px;
        font-size: 12px;
      }
      
      .tech-text {
        font-family: 'Share Tech Mono', monospace;
        fill: #e1e7ed;
        font-size: 11px;
      }
      
      .badge-bg {
        fill: #0f121d;
        stroke: #22293f;
        stroke-width: 1;
      }
    </style>

    <!-- Glowing Filters -->
    <filter id="glow-cyan" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="glow-magenta" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="glow-purple" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="glow-green" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Gradients -->
    <linearGradient id="main-border" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff007f" />
      <stop offset="50%" stop-color="#9d4edd" />
      <stop offset="100%" stop-color="#00f3ff" />
    </linearGradient>

    <!-- Grid Pattern -->
    <pattern id="tech-grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#121620" stroke-width="1" />
    </pattern>
  </defs>

  <!-- Background Base -->
  <rect width="100%" height="100%" fill="#06070a" />
  <rect width="100%" height="100%" fill="url(#tech-grid)" opacity="0.75" />

  <!-- Outer Glassmorphic Container -->
  <rect x="40" y="30" width="770" height="540" rx="16" fill="#0b0d15" fill-opacity="0.85" />
  <rect x="40" y="30" width="770" height="540" rx="16" fill="none" stroke="url(#main-border)" stroke-width="2" opacity="0.8" />

  <!-- Header Title -->
  <g transform="translate(60, 55)">
    <rect x="-5" y="3" width="6" height="15" fill="#9d4edd" />
    <text x="10" y="15" class="header-title">TECHNOLOGY INDEX // STACK</text>
  </g>

  <!-- ================= CATEGORY 01: LANGUAGES (Top-Left) ================= -->
  <g transform="translate(55, 80)">
    <!-- Sub-Panel Frame -->
    <rect width="360" height="220" rx="10" fill="#0c0e18" fill-opacity="0.7" stroke="#1d2238" stroke-width="1.5" />
    <path d="M 0,20 L 0,0 L 20,0" stroke="#00f3ff" stroke-width="2" fill="none" />
    <text x="15" y="22" class="panel-title" fill="#00f3ff">01 // LANGUAGES &amp; CORE</text>

    <!-- Badges Row 1 (y="45") -->
    <g transform="translate(15, 45)">
      <!-- Python (Cyan) -->
      <g transform="translate(0, 0)">
        <rect width="85" height="26" rx="6" class="badge-bg" />
        <circle cx="12" cy="13" r="3.5" fill="#00f3ff" filter="url(#glow-cyan)" />
        <text x="22" y="17" class="tech-text">Python</text>
      </g>
      <!-- JavaScript (Yellow/Magenta) -->
