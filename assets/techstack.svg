        <circle cx="12" cy="13" r="3.5" fill="#3ecf8e" filter="url(#glow-green)" />
        <text x="22" y="17" class="tech-text">HTML5</text>
      </g>
      <!-- CSS3 (Green) -->
      <g transform="translate(90, 0)">
        <rect width="75" height="26" rx="6" class="badge-bg" />
        <circle cx="12" cy="13" r="3.5" fill="#3ecf8e" filter="url(#glow-green)" />
        <text x="22" y="17" class="tech-text">CSS3</text>
      </g>
      <!-- PHP (Purple) -->
      <g transform="translate(175, 0)">
        <rect width="65" height="26" rx="6" class="badge-bg" />
        <circle cx="12" cy="13" r="3.5" fill="#9d4edd" filter="url(#glow-purple)" />
        <text x="22" y="17" class="tech-text">PHP</text>
      </g>
      <!-- Bash Script (Cyan) -->
      <g transform="translate(250, 0)">
