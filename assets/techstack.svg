        <circle cx="12" cy="13" r="3.5" fill="#00f3ff" filter="url(#glow-cyan)" />
        <text x="22" y="17" class="tech-text">Bash</text>
      </g>
    </g>

    <!-- Badges Row 3 (y="125") -->
    <g transform="translate(15, 125)">
      <!-- Arduino (Cyan) -->
      <g transform="translate(0, 0)">
        <rect width="90" height="26" rx="6" class="badge-bg" />
        <circle cx="12" cy="13" r="3.5" fill="#00f3ff" filter="url(#glow-cyan)" />
        <text x="22" y="17" class="tech-text">Arduino</text>
      </g>
      <!-- Figma (Magenta) -->
