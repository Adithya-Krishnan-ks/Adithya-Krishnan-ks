<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 350" width="100%" height="100%" style="border-radius: 12px; background: #06070a;">
  <defs>
    <!-- Import Google Fonts -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800;900&amp;family=Rajdhani:wght@600;700&amp;family=Share+Tech+Mono&amp;display=swap');
      
      .header-title {
        font-family: 'Orbitron', -apple-system, sans-serif;
        font-weight: 800;
        fill: #ffffff;
        letter-spacing: 2px;
        font-size: 18px;
        text-shadow: 0 0 10px rgba(0, 243, 255, 0.4);
      }
      
      .neon-text-cyan {
        font-family: 'Rajdhani', sans-serif;
        font-weight: 700;
        fill: #00f3ff;
        letter-spacing: 1px;
        text-shadow: 0 0 8px rgba(0, 243, 255, 0.6);
      }
      
      .neon-text-magenta {
        font-family: 'Rajdhani', sans-serif;
        font-weight: 700;
        fill: #ff007f;
        letter-spacing: 1px;
        text-shadow: 0 0 8px rgba(255, 0, 127, 0.6);
      }
      
      .body-tech {
        font-family: 'Share Tech Mono', monospace;
        fill: #c9d1d9;
        font-size: 13px;
        line-height: 1.6;
      }
      
      .bullet-num {
        font-family: 'Share Tech Mono', monospace;
        fill: #ff007f;
        font-weight: bold;
      }
      
      .hud-label {
        font-family: 'Rajdhani', sans-serif;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        font-size: 11px;
      }
    </style>

    <!-- Filters for Neon Glow -->
    <filter id="glow-cyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="glow-magenta" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="glow-purple" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Gradients -->
    <linearGradient id="border-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f3ff" />
      <stop offset="50%" stop-color="#9d4edd" />
      <stop offset="100%" stop-color="#ff007f" />
    </linearGradient>
    
    <linearGradient id="divider-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00f3ff" stop-opacity="0.1" />
      <stop offset="30%" stop-color="#00f3ff" stop-opacity="0.9" />
      <stop offset="70%" stop-color="#ff007f" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#ff007f" stop-opacity="0.1" />
    </linearGradient>

    <!-- Grid Pattern -->
    <pattern id="tech-grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#121620" stroke-width="1" />
    </pattern>
  </defs>

  <!-- Background Base -->
  <rect width="100%" height="100%" fill="#06070a" />
  
  <!-- Subtle Grid Pattern Overlay -->
  <rect width="100%" height="100%" fill="url(#tech-grid)" opacity="0.75" />

  <!-- Ambient Glow Behind Card -->
  <rect x="50" y="40" width="750" height="270" rx="16" fill="#00f3ff" opacity="0.03" filter="url(#glow-purple)" />

  <!-- Glassmorphic Card -->
  <g>
    <!-- Blur & Shadow Overlay -->
    <rect x="40" y="30" width="770" height="290" rx="16" fill="#0b0d15" fill-opacity="0.85" />
    <!-- Glowing Border -->
    <rect x="40" y="30" width="770" height="290" rx="16" fill="none" stroke="url(#border-grad)" stroke-width="2" opacity="0.8" />
  </g>

  <!-- Card HUD Details / Grid Accents -->
  <g opacity="0.5">
    <line x1="50" y1="40" x2="70" y2="40" stroke="#00f3ff" stroke-width="1" />
    <line x1="50" y1="40" x2="50" y2="60" stroke="#00f3ff" stroke-width="1" />
    
    <line x1="800" y1="310" x2="780" y2="310" stroke="#ff007f" stroke-width="1" />
    <line x1="800" y1="310" x2="800" y2="290" stroke="#ff007f" stroke-width="1" />
  </g>

  <!-- Title Indicator -->
  <g transform="translate(60, 55)">
    <circle cx="5" cy="10" r="3" fill="#00f3ff" filter="url(#glow-cyan)" />
    <text x="15" y="14" class="header-title">SYSTEM OVERVIEW</text>
  </g>

  <!-- Column 1: Identity & Description (Left) -->
  <g transform="translate(60, 95)">
    <!-- Sub-heading -->
    <text x="0" y="0" class="hud-label neon-text-cyan">BIOMETRICS // CREDENTIALS</text>
    
    <g class="body-tech">
      <text x="0" y="25"><tspan class="bullet-num">&gt;</tspan> BTech IT Undergraduate</text>
      <text x="0" y="50"><tspan class="bullet-num">&gt;</tspan> Specializing in Full Stack &amp; Applied AI</text>
      <text x="0" y="75"><tspan class="bullet-num">&gt;</tspan> Co-owner of an Urban Intelligence Startup</text>
      <text x="0" y="100"><tspan class="bullet-num">&gt;</tspan> Building tech at the intersection of</text>
      <text x="16" y="120">Healthcare and Advanced AI systems</text>
    </g>

    <!-- Technical status bar visual -->
    <text x="0" y="170" font-family="Share Tech Mono" font-size="9" fill="#4d5b7c">PROCESS_LOAD [■■■■■■■■■■■■■□□□] 82%</text>
  </g>

  <!-- Glowing Column Divider -->
  <line x1="425" y1="65" x2="425" y2="285" stroke="url(#divider-grad)" stroke-width="1.5" />

  <!-- Column 2: Areas of Interest & Focus (Right) -->
  <g transform="translate(455, 95)">
    <!-- Sub-heading -->
    <text x="0" y="0" class="hud-label neon-text-magenta">CORE NODES // OBJECTIVES</text>
    
    <!-- Focus Item 1 -->
    <g transform="translate(0, 20)">
      <rect x="0" y="5" width="4" height="20" fill="#00f3ff" />
      <text x="12" y="16" font-family="Rajdhani" font-weight="700" font-size="14" fill="#ffffff">01 // MODERN WEB SYSTEMS</text>
      <text x="12" y="32" class="body-tech" font-size="11.5">Reactive responsive frameworks &amp; robust API services</text>
    </g>

    <!-- Focus Item 2 -->
    <g transform="translate(0, 70)">
      <rect x="0" y="5" width="4" height="20" fill="#9d4edd" />
      <text x="12" y="16" font-family="Rajdhani" font-weight="700" font-size="14" fill="#ffffff">02 // APPLIED AI &amp; MACHINE LEARNING</text>
      <text x="12" y="32" class="body-tech" font-size="11.5">Intelligent models, Computer Vision, &amp; predictive AI</text>
    </g>

    <!-- Focus Item 3 -->
    <g transform="translate(0, 120)">
      <rect x="0" y="5" width="4" height="20" fill="#ff007f" />
      <text x="12" y="16" font-family="Rajdhani" font-weight="700" font-size="14" fill="#ffffff">03 // HEALTHCARE + TECH INTEGRATION</text>
      <text x="12" y="32" class="body-tech" font-size="11.5">Sensor telemetry, bio-informatics &amp; medical AI aids</text>
    </g>
  </g>

  <!-- Decorative Corner Elements -->
  <text x="790" y="47" text-anchor="end" font-family="Share Tech Mono" font-size="9" fill="#4d5b7c" opacity="0.6">SYS_ID: #079AC253</text>
</svg>
